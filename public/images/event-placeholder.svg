<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003466" />
      <stop offset="100%" stop-color="#1a4b84" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.08)" />
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" />
  <rect width="800" height="600" fill="url(#dots)" />
  <g transform="translate(400 300)" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-family="system-ui, sans-serif">
    <text font-size="64" font-weight="700" letter-spacing="0.05em">EVENT</text>
    <text font-size="18" y="44" fill="rgba(255,255,255,0.6)" letter-spacing="0.3em">SCOUT</text>
  </g>
</svg>
