<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: sans-serif; background-color: #f8f9fb; padding: 40px 20px;">
  <div
    style="max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
    <h1 style="font-size: 20px; font-weight: 800; color: #001f41; margin-bottom: 24px;">
      メールアドレスの確認
    </h1>
    <p style="font-size: 14px; color: #43474f; line-height: 1.8; margin-bottom: 24px;">
      アカウント登録ありがとうございます。<br>
      以下のボタンをクリックして、メールアドレスを確認してください。
    </p>
    <a href="{{ .ConfirmationURL }}"
      style="display: inline-block; background: linear-gradient(135deg, #001f41, #003466); color: #ffffff; font-size: 14px; font-weight: 700; text-decoration: none; padding: 14px 32px; border-radius: 8px;">
      メールアドレスを確認する
    </a>
    <p style="font-size: 12px; color: #737780; margin-top: 24px; line-height: 1.6;">
      心当たりがない場合は、このメールを無視してください。
    </p>
    <hr style="border: none; border-top: 1px solid #eceef0; margin: 32px 0 16px;">
    <p style="font-size: 11px; color: #c3c6d1; text-align: center;">
      ScoutLink<br>
      株式会社SHiRO
    </p>
  </div>
</body>

</html>
