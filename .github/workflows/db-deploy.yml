name: DB Deploy

on:
  push:
    branches:
      - staging
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-deploy.yml"

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link to staging project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link to production project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push
